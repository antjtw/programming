<!--
  RTS Return-to-Sport Programme — mobile web app
  Single self-contained HTML file. Persistent bodyweight via window.storage (artifact storage API).
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>復帰 — Return Programme</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root{
  --bg:#0A0D0B;
  --bg-2:#0E1210;
  --surface:#13181400;
  --card:#141A16;
  --card-2:#1A211C;
  --card-3:#212A23;
  --line:#27312A;
  --line-2:#323D34;
  --ink:#EAF0E8;
  --ink-dim:#98A29A;
  --ink-faint:#5C655E;
  --accent:#C8F23D;
  --accent-2:#A6CC2E;
  --accent-ink:#0A0D0B;
  --teal:#39C9D6;
  --warn:#F2B33D;
  --danger:#FF5C45;
  --danger-bg:#2A1411;
  --ok:#54D391;
  --display:'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  --mono:'JetBrains Mono','SFMono-Regular',ui-monospace,monospace;
  --maxw:460px;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--display);
  background:var(--bg);
  color:var(--ink);
  font-weight:400;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}

/* device frame on larger screens */
#app{
  position:relative;
  max-width:var(--maxw);
  margin:0 auto;
  min-height:100dvh;
  background:
    radial-gradient(120% 60% at 50% -10%, #11160F 0%, transparent 60%),
    var(--bg);
  display:flex;
  flex-direction:column;
  box-shadow:0 0 0 1px var(--line);
  overflow:hidden;
}
/* subtle grid texture */
#app::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:34px 34px;
  opacity:.12;
  -webkit-mask-image:radial-gradient(100% 70% at 50% 0%, #000 0%, transparent 75%);
  mask-image:radial-gradient(100% 70% at 50% 0%, #000 0%, transparent 75%);
}

/* ---------- top bar ---------- */
#topbar{
  position:sticky;top:0;z-index:30;
  display:flex;align-items:center;gap:10px;
  padding:14px 16px 12px;
  padding-top:max(14px,env(safe-area-inset-top));
  background:linear-gradient(180deg,rgba(10,13,11,.96),rgba(10,13,11,.72));
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  min-height:56px;
}
#backbtn{
  display:none;flex:none;width:34px;height:34px;border-radius:10px;
  border:1px solid var(--line-2);background:var(--card-2);color:var(--ink);
  font-size:17px;cursor:pointer;align-items:center;justify-content:center;
  transition:.15s;
}
#backbtn:active{transform:scale(.92);background:var(--card-3)}
#backbtn.show{display:flex}
#crumb{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--ink-faint);text-transform:uppercase;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#crumb b{color:var(--accent-2)}
#topTitle{font-weight:900;font-size:15px;letter-spacing:.01em}

/* ---------- content ---------- */
#view{position:relative;z-index:1;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 16px 120px}
.fade{animation:fade .45s cubic-bezier(.2,.7,.2,1) both}
.stagger>*{animation:up .5s cubic-bezier(.2,.7,.2,1) both}
.stagger>*:nth-child(1){animation-delay:.02s}
.stagger>*:nth-child(2){animation-delay:.06s}
.stagger>*:nth-child(3){animation-delay:.10s}
.stagger>*:nth-child(4){animation-delay:.14s}
.stagger>*:nth-child(5){animation-delay:.18s}
.stagger>*:nth-child(6){animation-delay:.22s}
.stagger>*:nth-child(7){animation-delay:.26s}
.stagger>*:nth-child(8){animation-delay:.30s}
.stagger>*:nth-child(n+9){animation-delay:.32s}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ---------- hero / headers ---------- */
.kicker{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent-2);margin-bottom:8px}
.jp-huge{font-weight:900;font-size:46px;line-height:.96;letter-spacing:-.01em}
.h1{font-weight:900;font-size:27px;line-height:1.05;letter-spacing:-.01em}
.h2{font-weight:900;font-size:19px;letter-spacing:.01em;margin:0 0 2px}
.sub{color:var(--ink-dim);font-size:14px}
.lead{color:var(--ink-dim);font-size:14.5px;line-height:1.6}

/* ---------- cards ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px}
.card+.card{margin-top:12px}
.tap{cursor:pointer;transition:.16s;position:relative}
.tap:active{transform:scale(.985)}
.tap:hover{border-color:var(--line-2)}
.row{display:flex;align-items:center;gap:12px}
.between{display:flex;align-items:center;justify-content:space-between;gap:12px}
.chev{flex:none;color:var(--ink-faint);font-size:20px;font-family:var(--mono)}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt24{margin-top:24px}.mt32{margin-top:32px}

/* meso/week list tiles */
.tile{display:flex;align-items:stretch;gap:0;background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden}
.tile .badge{flex:none;width:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:var(--card-2);border-right:1px solid var(--line)}
.tile .badge .jp{font-weight:900;font-size:20px;color:var(--accent)}
.tile .badge .en{font-family:var(--mono);font-size:9.5px;color:var(--ink-faint);letter-spacing:.05em}
.tile .body{flex:1;padding:14px 14px;min-width:0}
.tile .ttl{font-weight:700;font-size:15.5px;line-height:1.2}
.tile .meta{font-family:var(--mono);font-size:11px;color:var(--ink-dim);margin-top:4px;letter-spacing:.02em}
.tile .arr{display:flex;align-items:center;padding-right:14px;color:var(--ink-faint);font-family:var(--mono);font-size:18px}
.tile.tap:active{transform:scale(.99)}

/* pills / tags */
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;padding:4px 9px;border-radius:999px;border:1px solid var(--line-2);color:var(--ink-dim);background:var(--card-2);white-space:nowrap}
.tag.acc{color:var(--accent);border-color:var(--accent-2)}
.tag.teal{color:var(--teal);border-color:#2c6b71}
.tag.warn{color:var(--warn);border-color:#6b5a2c}
.tag.danger{color:var(--danger);border-color:#6b342c}

/* divider label */
.dl{display:flex;align-items:center;gap:10px;margin:22px 2px 12px}
.dl .t{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);white-space:nowrap}
.dl .ln{flex:1;height:1px;background:var(--line)}

/* bullet list */
.blist{list-style:none;display:flex;flex-direction:column;gap:10px}
.blist li{position:relative;padding-left:20px;color:var(--ink-dim);font-size:14px;line-height:1.55}
.blist li::before{content:"";position:absolute;left:2px;top:9px;width:7px;height:7px;border-radius:2px;background:var(--accent);transform:rotate(45deg)}
.blist.danger li::before{background:var(--danger)}
.blist.teal li::before{background:var(--teal)}
.blist strong{color:var(--ink)}

/* callout */
.callout{border-radius:16px;padding:14px 14px 14px 16px;border:1px solid;display:flex;gap:11px;align-items:flex-start}
.callout .ic{flex:none;font-family:var(--mono);font-weight:700;font-size:13px;width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center}
.callout .tx{font-size:13.5px;line-height:1.55}
.callout.danger{background:var(--danger-bg);border-color:#5a2820}
.callout.danger .ic{background:var(--danger);color:#fff}
.callout.danger .tx{color:#ffcfc7}
.callout.danger .tx b{color:#fff}
.callout.acc{background:#171f0c;border-color:#3c4d18}
.callout.acc .ic{background:var(--accent);color:var(--accent-ink)}
.callout.acc .tx{color:#dcecb4}
.callout.acc .tx b{color:var(--accent)}
.callout.teal{background:#0c1c1e;border-color:#1d4448}
.callout.teal .ic{background:var(--teal);color:#04201f}
.callout.teal .tx{color:#bfeef2}

/* stat strip */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{background:var(--card-2);border:1px solid var(--line);border-radius:14px;padding:12px 10px;text-align:center}
.stat .v{font-family:var(--mono);font-weight:700;font-size:19px;color:var(--ink)}
.stat .v .u{font-size:11px;color:var(--ink-faint)}
.stat .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin-top:3px}

/* ---------- session detail: movement table ---------- */
.sect-head{display:flex;align-items:center;gap:8px;margin:18px 2px 10px}
.sect-head .sq{width:9px;height:9px;border-radius:2px;background:var(--accent);transform:rotate(45deg)}
.sect-head .t{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink)}
.sect-head.warm .sq{background:var(--teal)}
.sect-head.acc-s .sq{background:var(--ink-faint)}

.mv{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 13px;margin-bottom:8px}
.mv .top{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.mv .nm{font-weight:700;font-size:14.5px;line-height:1.2}
.mv a.nm{color:var(--accent);text-decoration:none;border-bottom:1px dashed #4a5a22;padding-bottom:1px}
.mv .var{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);margin-top:2px}
.mv .nums{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
.mv .num{font-family:var(--mono);font-size:11px;background:var(--card-2);border:1px solid var(--line);border-radius:7px;padding:3px 7px;color:var(--ink-dim);white-space:nowrap}
.mv .num b{color:var(--ink);font-weight:700}
.mv .num.kg b{color:var(--accent)}
.mv .num.rpe b{color:var(--warn)}
.mv .nt{font-size:12.5px;color:var(--ink-dim);line-height:1.5;margin-top:9px;padding-top:9px;border-top:1px solid var(--line)}
.mv .nt .flag{color:var(--danger);font-weight:700}

/* ---------- bodyweight widget ---------- */
.bw{background:linear-gradient(135deg,#161c12,#12160f);border:1px solid var(--line-2);border-radius:18px;padding:16px;position:relative;overflow:hidden}
.bw::after{content:"体重";position:absolute;right:-6px;bottom:-16px;font-weight:900;font-size:72px;color:#ffffff05;letter-spacing:-.02em;pointer-events:none}
.bw .lab{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent-2)}
.bw .date{font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin-top:2px}
.bw .inrow{display:flex;align-items:center;gap:10px;margin-top:12px}
.bw input{
  flex:1;min-width:0;background:var(--bg-2);border:1px solid var(--line-2);border-radius:12px;
  color:var(--ink);font-family:var(--mono);font-weight:700;font-size:26px;padding:12px 14px;outline:none;
  transition:.15s;
}
.bw input:focus{border-color:var(--accent);box-shadow:0 0 0 3px #c8f23d22}
.bw .unit{font-family:var(--mono);font-weight:700;font-size:16px;color:var(--ink-faint)}
.bw button{
  flex:none;background:var(--accent);color:var(--accent-ink);border:none;border-radius:12px;
  font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:.04em;padding:13px 16px;cursor:pointer;transition:.15s;
}
.bw button:active{transform:scale(.95)}
.bw button.saved{background:var(--ok)}
.bw .hint{font-size:11.5px;color:var(--ink-faint);margin-top:10px;line-height:1.45}
.bw .hint b{color:var(--ink-dim)}

/* spark */
.spark{display:flex;align-items:flex-end;gap:3px;height:40px;margin-top:4px}
.spark .b{flex:1;background:var(--accent-2);border-radius:2px 2px 0 0;min-height:3px;opacity:.85}
.spark .b.last{background:var(--accent)}

/* home cardiac banner */
.heart{
  border-radius:18px;padding:16px;border:1px solid #5a2820;
  background:linear-gradient(135deg,#241210,#1a0f0d);position:relative;overflow:hidden;
}
.heart::after{content:"心";position:absolute;right:-8px;top:-18px;font-weight:900;font-size:84px;color:#ff5c4510;pointer-events:none}
.heart .t{display:flex;align-items:center;gap:8px;font-weight:900;font-size:15px;color:#ffd9d2}
.heart .dot{width:9px;height:9px;border-radius:50%;background:var(--danger);box-shadow:0 0 0 0 #ff5c4566;animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 #ff5c4566}70%{box-shadow:0 0 0 9px #ff5c4500}100%{box-shadow:0 0 0 0 #ff5c4500}}
.heart .tx{font-size:13px;color:#f0c4bc;line-height:1.55;margin-top:8px}
.heart .tx b{color:#fff}

/* progress meter */
.meter{height:7px;border-radius:99px;background:var(--card-3);overflow:hidden;margin-top:10px}
.meter .fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent-2),var(--accent))}

/* week session count chip */
.scount{font-family:var(--mono);font-size:10px;color:var(--accent);border:1px solid var(--accent-2);border-radius:7px;padding:2px 7px}

/* ---------- bottom nav ---------- */
#nav{
  position:sticky;bottom:0;z-index:30;
  display:grid;grid-template-columns:repeat(3,1fr);
  background:linear-gradient(0deg,rgba(10,13,11,.98),rgba(10,13,11,.85));
  backdrop-filter:blur(12px);
  border-top:1px solid var(--line);
  padding:8px 10px;
  padding-bottom:max(8px,env(safe-area-inset-bottom));
}
.navb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 0;border:none;background:none;cursor:pointer;color:var(--ink-faint);transition:.15s;border-radius:12px}
.navb .jp{font-weight:900;font-size:17px;line-height:1}
.navb .en{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase}
.navb.on{color:var(--accent)}
.navb:active{transform:scale(.94)}

a{color:var(--accent)}
.tcenter{text-align:center}
</style>

<div id="app">
  <div id="topbar">
    <button id="backbtn" aria-label="Back">‹</button>
    <div style="flex:1;min-width:0">
      <div id="crumb"></div>
      <div id="topTitle">復帰</div>
    </div>
  </div>
  <div id="view"></div>
  <nav id="nav">
    <button class="navb" data-nav="home"><span class="jp">家</span><span class="en">Home</span></button>
    <button class="navb" data-nav="prog"><span class="jp">計画</span><span class="en">Program</span></button>
    <button class="navb" data-nav="goals"><span class="jp">修正</span><span class="en">Goals</span></button>
  </nav>
</div>

<script>
/* ============================================================
   STORAGE WRAPPER  — uses artifact window.storage when present,
   falls back to in-memory (data won't persist if unavailable).
   ============================================================ */
const Store = {
  mem:{},
  ok:false,
  async get(k){
    try{ if(window.storage){ const r=await window.storage.get(k); return r? r.value : null; } }catch(e){}
    return (k in this.mem)? this.mem[k] : null;
  },
  async set(k,v){
    try{ if(window.storage){ await window.storage.set(k,v); this.ok=true; return true; } }catch(e){}
    this.mem[k]=v; return false;
  },
  async list(prefix){
    try{ if(window.storage){ const r=await window.storage.list(prefix); return r? r.keys : []; } }catch(e){}
    return Object.keys(this.mem).filter(k=>k.startsWith(prefix));
  }
};
const todayKey = ()=>{ const d=new Date(); return `bw:${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const fmtDate = (d)=> d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});

/* ============================================================
   PROGRAMME DATA
   ============================================================ */
// movement helper -> {n name, v variant, s sets×reps, p %, r rpe, k kg, nt notes, yt search, flag}
const yt = q => `https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`;
function M(n,v,s,r,k,nt,q,flag){return {n,v,s,r,k,nt,yt:q?yt(q):null,flag};}

/* ----- shared interim sessions (Meso 0) ----- */
const WARM = "Warm-up / Activation";
const m0 = {
  mon:{jp:"月",name:"Hip & Glute",focus:"Glute med, hip ER, MLA control",blocks:[
    {t:WARM,items:[
      M("90/90 hip switches",null,"2×8/side",null,null,"Slow, controlled. Posterior hip, not lumbar. Towel under R-knee if needed.","90/90 hip switch mobility"),
      M("Banded clamshells",null,"3×15/side",null,null,"Heavy band, slow eccentric. Glute med focus, L-side first.","banded clamshell exercise"),
    ]},
    {t:"Main",items:[
      M("Side-lying hip abduction","ER bias","3×12/side",null,null,"Toe slightly DOWN — glute med over TFL. Pillow between knees for R-knee.","side lying hip abduction glute medius"),
      M("Single-leg balance + reach",null,"3×30s/side",null,null,"Reach forward/side/back. Proprioceptive load on MLA. Compare L vs R.","single leg balance reach"),
      M("Copenhagen plank","short lever","3×20s/side","RPE 5-6",null,"Top knee on bench. Eccentric adductor protector — most important addition.","copenhagen plank short lever"),
      M("Posterior knee desensitization",null,"5 min",null,null,"Sub-threshold pressure (awareness, not pain). Pain ≤3/10 — track threshold weekly.","tennis ball self massage calf knee","R-knee"),
    ]},
    {t:"Finish",items:[ M("Slow nasal breathing",null,"10 min","5-6 brpm",null,"In 5s nose, out 5-6s. Vagal tone + HRV.","slow nasal breathing 5 breaths") ]},
  ]},
  tue:{jp:"火",name:"Ankle & T-Spine",focus:"Dorsiflexion, thoracic ext, foot intrinsics",blocks:[
    {t:WARM,items:[
      M("Banded ankle distraction",null,"2×10/side",null,null,"Band around ankle, pull joint back, knee to wall.","banded ankle joint distraction"),
      M("Copenhagen plank","short lever","3×20s/side","RPE 5-6",null,"Top knee on bench. Build hold time gradually.","copenhagen plank short lever"),
    ]},
    {t:"Main",items:[
      M("Weighted knee-to-wall",null,"3×10/side",null,null,"Light DB. Heel stays down throughout.","weighted knee to wall ankle"),
      M("Calf stretch","rear foot IN","2×30s/side",null,null,"Toe slightly inward — addresses ER compensation.","calf stretch wall internal rotation"),
      M("Foam roller t-spine ext",null,"3×10",null,null,"Pause 2s at end range.","foam roller thoracic extension"),
      M("Quadruped t-spine rotation",null,"2×8/side",null,null,"Hand behind head, rotate, look up.","quadruped thoracic rotation"),
      M("Wall slides",null,"2×10",null,null,"Scap-friendly. Front delt stabilisation patterning.","wall slide shoulder"),

    ]},
    {t:"Finish",items:[ M("Slow nasal breathing",null,"10 min","5-6 brpm",null,"Downregulate. Pre-sleep ideal.","slow nasal breathing 5 breaths") ]},
  ]},
  wed:{jp:"水",name:"R-Leg & Knee",focus:"Asymmetry, R-side strength, knee ROM",blocks:[
    {t:WARM,items:[
      M("Copenhagen plank","short lever","3×20s/side","RPE 5-6",null,"Adductor protector.","copenhagen plank short lever"),
    ]},
    {t:"Main",items:[
      M("Split squat","R-leg front","2×8, 3s ecc.","RPE 5-6",null,"BW only. Pain-free knee range. Closing L/R asymmetry is the long-game fix.","split squat slow eccentric"),
      M("Single-leg glute bridge","R only","2×10","RPE 5-6",null,"R-foot planted, L-leg up. Targets weak R-glute. Match L to compare.","single leg glute bridge"),
      M("Posterior knee desensitization",null,"5 min",null,null,"Sub-threshold only. Track tolerance week to week.","tennis ball self massage calf knee","R-knee"),
      M("Supine heel slides",null,"2×10/side",null,null,"Slide heel to glute through PAIN-FREE range only. ROM expands gradually.","supine heel slide knee flexion","R-knee"),

    {t:"Finish",items:[ M("Slow nasal breathing",null,"10 min","5-6 brpm",null,"Vagal tone.","slow nasal breathing 5 breaths") ]},
  ]},
  thu:{jp:"木",name:"Hip Mobility (R-bias)",focus:"R-hip internal rotation & flexion",blocks:[
    {t:WARM,items:[
      M("Copenhagen plank","short lever","3×20s/side","RPE 5-6",null,"Adductor protector.","copenhagen plank short lever"),
    ]},
    {t:"Main",items:[
      M("R-hip 90/90 IR/ER drill","R-focus","2×8/side",null,null,"Focus R-hip internal rotation. Restricted R-hip overloads L-adductor — upstream cause.","90/90 hip internal rotation"),
      M("R-hip flexion CARs",null,"2×5 circles",null,null,"Controlled articular rotations. Owned ROM beats forced ROM.","hip CARs controlled articular rotations"),
      M("Hip airplane","assisted","2×8/side",null,null,"Hand on wall. Stance leg slightly bent, never locked.","hip airplane exercise"),

    {t:"Finish",items:[ M("Slow nasal breathing",null,"10 min","5-6 brpm",null,"Downregulate.","slow nasal breathing 5 breaths") ]},
  ]},
  fri:{jp:"金",name:"Tendon Iso & Foot",focus:"Tendon stiffness, load tolerance",blocks:[
    {t:WARM,items:[

/* ----- Meso definitions ----- */
function repWeeks(w1, n, prog){
  // build n weeks: week1 detailed, rest reference w1 with progression notes
  const out=[{id:"w1",jp:"1週",label:prog[0]||"Build",focus:prog[0]||"",sessions:w1, note:null}];
  for(let i=2;i<=n;i++){
    out.push({id:"w"+i,jp:i+"週",label:prog[i-1]||("Week "+i),focus:prog[i-1]||"",sessions:w1,
      note:`Same session structure as Week 1, progressed: ${i<n?"load/volume up ~3-5%, RPE ceiling held.":"deload — volume down ~40%, intensity maintained, used to assess."}`});
  }
  return out;
}

const V = document.getElementById('view');
const crumbEl = document.getElementById('crumb');
const titleEl = document.getElementById('topTitle');
const backBtn = document.getElementById('backbtn');
let state = {view:'home', meso:null, week:null, sess:null};
let histStack = [];

function go(next, push=true){
  if(push) histStack.push({...state});
  state = {...state, ...next};
  render();
}
backBtn.onclick = ()=>{ if(histStack.length){ state = histStack.pop(); render(); } };

document.querySelectorAll('.navb').forEach(b=>{
  b.onclick=()=>{
    const n=b.dataset.nav;
    histStack=[];
    if(n==='home') state={view:'home'};
    else if(n==='prog') state={view:'prog'};
    else state={view:'goals'};
    render();
  };
});

function setChrome(crumb,title,showBack,navKey){
  crumbEl.innerHTML = crumb||'';
  titleEl.textContent = title;
  backBtn.classList.toggle('show', !!showBack);
  document.querySelectorAll('.navb').forEach(b=>b.classList.toggle('on', b.dataset.nav===navKey));
}

function mesoBy(id){return PROG.mesos.find(m=>m.id===id);}

/* ---------- bodyweight home block ---------- */
async function bwHomeBlock(){
  const keys = await Store.list('bw:');
  keys.sort();
  const recent = keys.slice(-10);
  const vals = [];
  for(const k of recent){ const v=await Store.get(k); if(v!=null) vals.push(parseFloat(v)); }
  let spark='', latest='—', avg='—';
  if(vals.length){
    const min=Math.min(...vals), max=Math.max(...vals), rng=(max-min)||1;
    spark = `<div class="spark">`+vals.map((v,i)=>{
      const h=12+((v-min)/rng)*28;
      return `<div class="b ${i===vals.length-1?'last':''}" style="height:${h}px" title="${v}"></div>`;
    }).join('')+`</div>`;
    latest = vals[vals.length-1].toFixed(1);
    avg = (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
  }
  return `
  <div class="dl"><span class="t">体重 — Bodyweight</span><span class="ln"></span></div>
  <div class="card">
    <div class="between">
      <div><div class="kicker" style="margin:0">Latest</div><div style="font-family:var(--mono);font-weight:700;font-size:28px;color:var(--accent)">${latest}<span style="font-size:13px;color:var(--ink-faint)"> kg</span></div></div>
      <div class="tcenter"><div class="kicker" style="margin:0">10-day avg</div><div style="font-family:var(--mono);font-weight:700;font-size:18px;color:var(--ink-dim)">${avg}<span style="font-size:11px"> kg</span></div></div>
    </div>
    ${spark || '<div class="sub mt8" style="font-size:12.5px">No entries yet — log today\'s weight below or inside any session.</div>'}
    ${bwInputHTML('home')}
  </div>`;
}

/* ---------- SESSION detail ---------- */
async function viewSess(){
  const m=mesoBy(state.meso);
  const w=m.weeks.find(x=>x.id===state.week);
  const s=w.sessions.find(x=>x.id===state.sess);
  setChrome(`${m.code} / ${w.jp} / <b>${s.jp}</b>`,s.name,true,'prog');

  const blocks = s.blocks.map(b=>{
    const cls = b.t===WARM?'warm':(b.t==='Main'?'':'acc-s');
    const items = b.items.map(it=>{
      const nm = it.yt? `<a class="nm" href="${it.yt}" target="_blank" rel="noopener">${it.n}</a>` : `<span class="nm">${it.n}</span>`;
      const nums=[];
      if(it.s) nums.push(`<span class="num"><b>${it.s}</b></span>`);
      if(it.r && it.r!=='—') nums.push(`<span class="num rpe">${it.r.replace('RPE ','RPE ')}</span>`);
      if(it.k && it.k!=='—') nums.push(`<span class="num kg"><b>${it.k}</b>${/^[0-9.]+$/.test(it.k)?' kg':''}</span>`);
      const noteFlag = it.flag? `<span class="flag">⚠ ${it.flag}:</span> ` : '';
      return `<div class="mv">
        <div class="top"><div>${nm}${it.v?`<div class="var">${it.v}</div>`:''}</div></div>
        ${nums.length?`<div class="nums">${nums.join('')}</div>`:''}
        ${it.nt?`<div class="nt">${noteFlag}${it.nt}</div>`:''}
      </div>`;
    }).join('');
    return `<div class="sect-head ${cls}"><span class="sq"></span><span class="t">${b.t}</span></div>${items}`;
  }).join('');

  V.innerHTML = `<div class="fade">
    <div><div class="kicker">${m.name} · ${w.label}</div>
    <div class="h1" style="display:flex;align-items:baseline;gap:10px"><span style="color:var(--accent);font-size:30px">${s.jp}</span>${s.name}</div>
    <div class="sub mt8">${s.focus}</div></div>
    <div class="mt16" id="bwSlot"></div>
    ${blocks}
    <div class="callout teal mt16"><div class="ic">✓</div><div class="tx">Tap a movement name to open a demo search. Numbers are starting prescriptions — autoregulate to the RPE cap, don't chase the kg.</div></div>
  </div>`;
  document.getElementById('bwSlot').innerHTML = await sessionBWCard();
  bindBW();
}

/* ---------- bodyweight: shared input ---------- */
function bwInputHTML(scope){
  return `<div class="bw-inrow inrow" style="margin-top:12px">
      <input id="bwInput_${scope}" type="number" inputmode="decimal" step="0.1" placeholder="— —" aria-label="Bodyweight kg">
      <span class="unit">kg</span>
      <button id="bwSave_${scope}" data-scope="${scope}">SAVE</button>
    </div>`;
}
async function sessionBWCard(){
  return `<div class="bw">
    <div class="lab">今日の体重 — Today's bodyweight</div>
    <div class="date">${fmtDate(new Date())}</div>
    ${bwInputHTML('sess')}
    <div class="hint">Saved <b>per day</b> and shared across every session — log it once today and it shows everywhere. <b>Persists</b> when you close and reopen the app.</div>
  </div>`;
}
async function bindBW(){
  const cur = await Store.get(todayKey());
  document.querySelectorAll('[id^="bwInput_"]').forEach(inp=>{ if(cur!=null) inp.value=cur; });
  document.querySelectorAll('[id^="bwSave_"]').forEach(btn=>{
    btn.onclick = async ()=>{
      const scope=btn.dataset.scope;
      const inp=document.getElementById('bwInput_'+scope);
      const val=parseFloat(inp.value);
      if(isNaN(val)||val<=0){ inp.focus(); return; }
      await Store.set(todayKey(), val);
      // mirror to any other open inputs
      document.querySelectorAll('[id^="bwInput_"]').forEach(o=>o.value=val);
      const old=btn.textContent; btn.textContent='SAVED ✓'; btn.classList.add('saved');
      setTimeout(()=>{ btn.textContent=old; btn.classList.remove('saved'); },1400);
    };
  });
}

/* ---------- dispatch ---------- */
function render(){
  V.scrollTop=0;
  const v=state.view;
  if(v==='home') viewHome();
  else if(v==='prog') viewProg();
  else if(v==='meso') viewMeso();
  else if(v==='week') viewWeek();
  else if(v==='sess') viewSess();
  else if(v==='goals') viewGoals();
  V.scrollTop=0;
}
render();
